name: Deploy Websites

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: nginx-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Website
        uses: appleboy/scp-action@master

        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          source: "website/*"
          target: "/tmp"

      - name: Deploy Files
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}

          script: |
            sudo cp -r /tmp/website/* /var/www/html/
            sudo systemctl restart nginx
